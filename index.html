<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi Diklat BDK Pontianak</title>
    <style>
        :root {
            --bg-color: #050505;
            --header-color: #003366;
            --accent-color: #f1c40f; 
            --text-normal: #ffffff;
            --text-dim: #b0b0b0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-normal);
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background-color: var(--header-color);
            border-bottom: 4px solid #444;
        }

        .logo-text h1 { margin: 0; font-size: 22px; }
        .logo-text p { margin: 0; color: var(--accent-color); font-weight: bold; font-size: 12px; }

        #clock { font-size: 28px; font-family: monospace; color: var(--accent-color); }

        .container {
            display: grid;
            grid-template-columns: 65% 35%;
            height: calc(100vh - 150px);
            padding: 15px;
            gap: 15px;
        }

        .schedule-board {
            background: #111;
            border-radius: 5px;
            padding: 10px;
            border: 1px solid #333;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            text-align: left;
            padding: 10px;
            background: #222;
            color: var(--accent-color);
            position: sticky;
            top: 0;
            border-bottom: 2px solid #444;
        }

        td { padding: 10px; border-bottom: 1px solid #222; }

        .status-active { color: var(--accent-color); font-weight: bold; background: rgba(241, 196, 15, 0.1); }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .media-area { background: #000; border: 2px solid #333; border-radius: 5px; }

        footer {
            position: fixed;
            bottom: 0; width: 100%;
            background: #b30000;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .marquee-text {
            white-space: nowrap;
            animation: marquee 50s linear infinite;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }

        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<header>
    <div class="logo-text">
        <h1>BALAI DIKLAT KEUANGAN PONTIANAK</h1>
        <p>KALENDER PEMBELAJARAN TA 2026 - REVISI</p>
    </div>
    <div class="time-section" style="text-align:right">
        <div id="clock">00:00:00</div>
        <div id="date" style="font-size: 12px;"></div>
    </div>
</header>

<div class="container">
    <div class="schedule-board">
        <table>
            <thead>
                <tr>
                    <th>MULAI</th>
                    <th>SELESAI</th>
                    <th>NAMA PELATIHAN</th>
                    <th>JAMLAT</th>
                    <th>METODE</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="schedule-body"></tbody>
        </table>
    </div>

    <div class="media-area">
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=PL6cAFDkCmjW95RlQ_lwtSM-TrgfBf3SJY&autoplay=1&mute=1&loop=1" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<footer>
    <div class="marquee-text" id="marquee-info"></div>
</footer>

<script>
    // CARA INPUT MUDAH (Satu baris untuk semua info)
    // Format: "TanggalUrut(YYYY-MM-DD) | Nama Pelatihan | Tgl Mulai | Tgl Selesai | Jamlat | Metode"
    const rawData = [
        "2026-03-06 | Pelatihan Teknis Perpajakan (Revisi) | 06 Mar | 10 Mar | 45 | Klasikal",
        "2026-08-11 | AP / APTS (Kalpem Utama) | 11 Agt | 25 Agt | 111 | PJJ",
        "2026-09-01 | Diklat Pengelolaan Keuangan Negara | 01 Sep | 05 Sep | 40 | Klasikal",
        "2026-10-15 | PJJ Akuntansi Pemerintahan | 15 Okt | 20 Okt | 35 | PJJ"
    ];

    function updateDisplay() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        // Marquee Info dari Lampiran [cite: 1, 5]
        document.getElementById('marquee-info').innerText = "PENGUMUMAN: Total Durasi 387 Hari Pelaksanaan --- Target 1820 Peserta --- Penanggung Jawab: Anik Jursantuti --- BDK Pontianak Terukur, Bahagia, Ikhlas ---";

        const tbody = document.getElementById('schedule-body');
        tbody.innerHTML = '';

        rawData.forEach(line => {
            const [sortDate, nama, mulai, selesai, jamlat, metode] = line.split('|').map(s => s.trim());
            const trainingDate = new Date(sortDate);
            const isOngoing = now.toDateString() === trainingDate.toDateString();

            const row = document.createElement('tr');
            if (isOngoing) row.className = 'status-active';

            row.innerHTML = `
                <td>${mulai}</td>
                <td>${selesai}</td>
                <td>${nama}</td>
                <td>${jamlat}</td>
                <td>${metode}</td>
                <td>${isOngoing ? '<span class="blink">● BERLANGSUNG</span>' : 'AKAN DATANG'}</td>
            `;
            tbody.appendChild(row);
        });
    }

    setInterval(updateDisplay, 1000);
    updateDisplay();
</script>

</body>
</html>
