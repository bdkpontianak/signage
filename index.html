<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi Diklat & Cuaca BDK Pontianak</title>
    <style>
        :root {
            --bg-color: #050505;
            --header-color: #003366;
            --accent-color: #f1c40f; 
            --alert-bg: #b30000;
            --text-normal: #ffffff;
            --text-dim: #b0b0b0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-normal);
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background-color: var(--header-color);
            border-bottom: 4px solid #444;
        }

        .logo-text h1 { margin: 0; font-size: 20px; }
        .logo-text p { margin: 0; color: var(--accent-color); font-weight: bold; font-size: 11px; }

        /* Weather Alert Panel */
        #weather-alert {
            background: #1a1a1a;
            border-left: 5px solid var(--accent-color);
            margin: 10px 15px 0 15px;
            padding: 12px;
            display: block;
        }

        .container {
            display: grid;
            grid-template-columns: 70% 30%;
            height: calc(100vh - 200px);
            padding: 15px;
            gap: 15px;
        }

        .schedule-board {
            background: #111;
            border-radius: 5px;
            padding: 10px;
            border: 1px solid #333;
            overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px; background: #222; color: var(--accent-color); position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #222; }

        .status-active { color: var(--accent-color); font-weight: bold; background: rgba(241, 196, 15, 0.1); }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }

        .media-area { background: #000; border: 2px solid #333; border-radius: 5px; position: relative; }

        /* PERBAIKAN NEWSTICKER */
        footer {
            position: fixed;
            bottom: 0; width: 100%;
            background: var(--alert-bg);
            height: 45px;
            display: flex;
            align-items: center;
            overflow: hidden; /* Memastikan teks tidak keluar jalur */
        }

        .marquee-wrapper {
            width: 100%;
            overflow: hidden;
        }

        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee-animation 40s linear infinite;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }

        @keyframes marquee-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">
        <h1>BALAI DIKLAT KEUANGAN PONTIANAK</h1>
        <p>KALENDER PEMBELAJARAN TA 2026 - REVISI</p>
    </div>
    <div style="text-align: right;">
        <div id="clock" style="font-size: 24px; color: var(--accent-color); font-family: monospace;">00:00:00</div>
        <div id="date" style="font-size: 12px;"></div>
    </div>
</header>

<div id="weather-alert">
    <strong style="color: var(--accent-color);">☀️ INFO CUACA BDK PONTIANAK (Refreshed):</strong>
    <span id="alert-content">Menghubungkan ke API BMKG...</span>
</div>

<div class="container">
    <div class="schedule-board">
        <table>
            <thead>
                <tr>
                    <th>MULAI</th>
                    <th>NAMA PELATIHAN</th>
                    <th>JAMLAT</th>
                    <th>METODE</th>
                    <th>PIC</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="schedule-body"></tbody>
        </table>
    </div>

    <div class="media-area">
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=PL6cAFDkCmjW95RlQ_lwtSM-TrgfBf3SJY&autoplay=1&mute=1&loop=1" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<footer>
    <div class="marquee-wrapper">
        <div class="marquee-text" id="marquee-info">
            </div>
    </div>
</footer>

<script>
    const rawData = [
        "2026-03-06 | Pelatihan Teknis Perpajakan | 06 Mar | 45 | Klasikal | Seksi Penyelenggaraan",
        "2026-08-11 | AP / APTS | 11 Agt | 111 | PJJ | Bidang PPA",
        "2026-09-01 | Diklat Pengelolaan BMN | 01 Sep | 40 | Klasikal | Subbag Umum"
    ];

    // REFRESH CUACA SETIAP 60 MENIT (3600000 ms)
    async function fetchWeatherCAP() {
        const alertContent = document.getElementById('alert-content');
        const timestamp = new Date().toLocaleTimeString();
        
        try {
            // Simulasi pengambilan data dari API CAP/Nowcast
            // Pada penggunaan nyata, ganti dengan fetch(url_api_bmkg)
            const mockWeather = "Cerah Berawan, 32°C. Kelembapan 75%."; 
            alertContent.innerHTML = `<strong>${mockWeather}</strong> (Pembaruan terakhir: ${timestamp})`;
            console.log("Weather updated at " + timestamp);
        } catch (error) {
            alertContent.innerText = "Gagal memuat data cuaca.";
        }
    }

    function updateDashboard() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        // Perbaikan Newsticker / Marquee (Teks Berjalan)
        const newsContent = `PENGUMUMAN INTERNAL: Seluruh pegawai wajib melakukan presensi melalui aplikasi Semesta --- Informasi Diklat TA 2026 Revisi: Total 387 Hari Pelaksanaan dengan Target 1820 Peserta --- Penanggung Jawab: Anik Jursantuti --- BDK Pontianak: Terukur, Bahagia, Ikhlas --- `;
        document.getElementById('marquee-info').innerText = newsContent + newsContent; // Duplicate for smooth loop

        const tbody = document.getElementById('schedule-body');
        tbody.innerHTML = '';

        rawData.forEach(line => {
            const [checkDate, nama, mulai, jamlat, metode, pic] = line.split('|').map(s => s.trim());
            const isOngoing = now.toISOString().split('T')[0] === checkDate;
            const row = document.createElement('tr');
            if (isOngoing) row.className = 'status-active';
            row.innerHTML = `<td>${mulai}</td><td>${nama}</td><td>${jamlat}</td><td>${metode}</td><td>${pic}</td><td>${isOngoing ? '<span class="blink">● BERLANGSUNG</span>' : 'AKAN DATANG'}</td>`;
            tbody.appendChild(row);
        });
    }

    // Interval Timer
    setInterval(updateDashboard, 1000); // Update jam dan tabel setiap detik
    setInterval(fetchWeatherCAP, 3600000); // REFRESH CUACA SETIAP 60 MENIT

    // Inisialisasi awal
    updateDashboard();
    fetchWeatherCAP();
</script>

</body>
</html>
