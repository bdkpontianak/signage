<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDK Pontianak Digital Signage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Ekstraksi Warna Resmi Logo Kemenkeu Corpu */
            --bg-color: #030914;          /* Navy super gelap untuk kesan premium & high contrast */
            --header-color: #002d57;      /* Deep Blue (Sisi gelap logo) */
            --blue-light: #2997 d8;        /* Light Blue (Sisi terang logo) */
            --accent-color: #ffc212;      /* Gold/Yellow Corporate (Sisi kanan logo) */
            --accent-dim: #d49e0b;        /* Gold versi sedikit redup untuk variasi */
            
            /* Warna Ticker disesuaikan dengan palet Corpu agar tetap elegan */
            --internal-bg: #004580;       /* Medium Blue */
            --news-bg: #c99402;           /* Dark Yellow / Amber */
            
            --text-normal: #ffffff;
            --text-dim: #a3b8cc;          /* Soft blue-grey untuk teks sekunder */
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-normal);
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--header-color);
            border-bottom: 3px solid var(--blue-light);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .logo-text h1 { 
            margin: 0; 
            font-size: 24px; 
            font-weight: 800; 
            letter-spacing: 1px;
            color: #ffffff;
        }
        .logo-text p { 
            margin: 4px 0 0 0; 
            color: var(--accent-color); 
            font-weight: 600; 
            font-size: 13px; 
            letter-spacing: 2px;
        }

        #weather-alert {
            background: rgba(0, 45, 87, 0.4);
            border-left: 5px solid var(--blue-light);
            margin: 15px 15px 0 15px;
            padding: 12px 20px;
            display: block;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .container {
            display: grid;
            grid-template-columns: 72% 28%;
            height: calc(100vh - 250px);
            padding: 15px;
            gap: 15px;
            box-sizing: border-box;
        }

        .schedule-board {
            background: rgba(5, 15, 30, 0.85);
            border-radius: 6px;
            padding: 0;
            border: 1px solid rgba(41, 151, 216, 0.2);
            overflow-y: auto;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 14px; 
        }
        
        th { 
            text-align: left; 
            padding: 16px 12px; 
            background: #02162e; 
            color: var(--accent-color); 
            position: sticky; 
            top: 0; 
            text-transform: uppercase; 
            font-weight: 600;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--blue-light);
        }
        
        td { 
            padding: 14px 12px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            font-weight: 400;
            text-transform: uppercase; /* Karakteristik utama layar bandara */
        }

        /* Kolom nama pelatihan tetap proporsional */
        td:nth-child(3) {
            font-weight: 600;
            color: #ffffff;
        }

        /* Efek Berkedip Seluruh Baris ala Bandara */
        .status-active { 
            font-weight: 600; 
            animation: airport-blink 2.5s infinite ease-in-out;
        }
        
        .blink { 
            animation: text-blink 1s linear infinite; 
            color: var(--accent-color);
        }

        @keyframes airport-blink {
            0%, 100% { background: rgba(255, 194, 18, 0.02); }
            50% { background: rgba(255, 194, 18, 0.12); }
        }

        @keyframes text-blink { 50% { opacity: 0.2; } }

        .media-area { 
            background: #000; 
            border: 1px solid rgba(41, 151, 216, 0.3); 
            border-radius: 6px; 
            position: relative; 
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        footer {
            position: fixed;
            bottom: 0; width: 100%;
            display: flex;
            flex-direction: column;
        }

        .ticker-row { 
            height: 38px; 
            display: flex; 
            align-items: center; 
            overflow: hidden; 
            position: relative; 
        }
        
        .orange-ticker { background: var(--news-bg); border-top: 1px solid rgba(255,255,255,0.1); }
        .red-ticker { background: var(--internal-bg); border-top: 1px solid rgba(255,255,255,0.1); }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee-animation 50s linear infinite;
            font-size: 14px;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        @keyframes marquee-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">
        <h1>BALAI DIKLAT KEUANGAN PONTIANAK</h1>
        <p>TERUKUR - BAHAGIA - IKHLAS</p>
    </div>
    <div style="text-align: right;">
        <div id="clock" style="font-size: 28px; color: var(--accent-color); font-weight: 600; font-family: monospace; letter-spacing: 1px;">00:00:00</div>
        <div id="date" style="font-size: 13px; color: var(--text-dim); margin-top: 2px; text-transform: uppercase; font-weight: 600;"></div>
    </div>
</header>

<div id="weather-alert">
    <strong style="color: var(--accent-color);">☀️ INFO CUACA BDK PONTIANAK:</strong>
    <span id="alert-content" style="color: var(--text-normal);">Memuat data cuaca...</span>
</div>

<div class="container">
    <div class="schedule-board">
        <table>
            <thead>
                <tr>
                    <th width="10%">MULAI</th>
                    <th width="10%">SELESAI</th>
                    <th width="35%">NAMA PELATIHAN</th>
                    <th width="8%">JAMLAT</th>
                    <th width="10%">METODE</th>
                    <th width="12%">PIC</th>
                    <th width="15%">STATUS</th>
                </tr>
            </thead>
            <tbody id="schedule-body"></tbody>
        </table>
    </div>

    <div class="media-area">
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=PL6cAFDkCmjW9aUwVGfKRf5Hatxip4zecQ&autoplay=1&mute=1&loop=1&playlist=PL6cAFDkCmjW9aUwVGfKRf5Hatxip4zecQ" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<footer>
    <div class="ticker-row orange-ticker">
        <div class="marquee-content" id="newsContent">MENGHUBUNGKAN KE GOOGLE NEWS RSS...</div>
    </div>
    <div class="ticker-row red-ticker">
        <div class="marquee-content" id="internalContent">MEMUAT PENGUMUMAN INTERNAL...</div>
    </div>
</footer>

<script>
    /*******************************************************************************
     * 1. PENGATURAN DATA PELATIHAN
     *******************************************************************************/
    const daftarPelatihan = [
        {
            tgl_mulai:   '2026-05-04',
            tgl_selesai: '2026-05-07',
            nama:        'Pelatihan Jarak Jauh Sistem Manajemen Keamanan Informasi Angkatan II',
            jamlat:      '33',
            metode:      'PJJ',
            pic:         'Damhudi'
        },
        {
            tgl_mulai:   '2026-05-04',
            tgl_selesai: '2026-05-11',
            nama:        'Pelatihan Jarak Jauh Bendahara Pengeluaran/Bendahara Pengeluaran Pembantu Angkatan IV',
            jamlat:      '33',
            metode:      'PJJ',
            pic:         'Dharmindra'
        },
        {
            tgl_mulai:   '2026-05-06',
            tgl_selesai: '2026-05-08',
            nama:        'E-Learning Pembekalan dan Sertifikasi Penyusun RKA Level Manajerial Angkatan II',
            jamlat:      '9',
            metode:      'PJJ',
            pic:         'Riki'
        },
        {
            tgl_mulai:   '2026-05-11',
            tgl_selesai: '2026-06-19',
            nama:        'Pelatihan Jarak Jauh Menulis untuk Media Massa Angkatan I',
            jamlat:      '43',
            metode:      'PJJ',
            pic:         'Gilang'
        },
        {
            tgl_mulai:   '2026-05-18',
            tgl_selesai: '2026-05-22',
            nama:        'PJJ Pembuatan Analisis untuk Penentuan Objek Penggalian Potensi Angkatan I',
            jamlat:      '40',
            metode:      'PJJ',
            pic:         '-'
        },
        {
            tgl_mulai:   '2026-05-18',
            tgl_selesai: '2026-05-22',
            nama:        'Pelatihan Penggalian Potensi Pajak Daerah Angkatan I',
            jamlat:      '40',
            metode:      'PJJ',
            pic:         '-'
        },
        {
            tgl_mulai:   '2026-05-18',
            tgl_selesai: '2026-06-04',
            nama:        'Pelatihan Jarak Jauh Teknik Penyusunan Laporan yang Efektif Angkatan I',
            jamlat:      '24',
            metode:      'PJJ',
            pic:         'Damhudi'
        },
        {
            tgl_mulai:   '2026-05-19',
            tgl_selesai: '2026-05-25',
            nama:        'Pelatihan Jarak Jauh Pejabat Pembuat Komitmen Angkatan III',
            jamlat:      '24',
            metode:      'PJJ',
            pic:         'Sri'
        },
    ];

    /*******************************************************************************
     * 2. PENGATURAN NEWSTICKER "INFO INTERNAL"
     *******************************************************************************/
    const beritaInternal = [
        "Mulai dari beragam pelatihan, berbagai kegiatan penguatan kapasitas SDM pengelola keuangan, kolaborasi lintas unit yang terus diperluas, hingga evaluasi pembelajaran mahasiswa - satu bulan yang produktif telah dilalui bersama. Semua ini adalah bagian dari komitmen BPPK dalam mencetak SDM unggul untuk pengelolaan keuangan negara yang lebih baik.",
        "Sinergi bukan sekadar kata tetapi adalah langkah nyata Dukungan penuh dari pimpinan Perwakilan Kementerian Keuangan Kalimantan Barat menjadi energi besar bagi penguatan UMKM melalui kolaborasi program INKUBBI dan UMKM Beyond Border",
        "TOLAK DAN LAPORKAN GRATIFIKASI melalui saluran pengaduan resmi berikut: pengaduan.bdkpnk@kemenkeu.go.id | wise.kemenkeu.go.id",
        "BDK PONTIANAK: TERUKUR, BAHAGIA, IKHLAS",
        "JAGA KESEHATAN DAN TETAP SEMANGAT DALAM MELAYANI"
    ];

    /*******************************************************************************
     * KODE SISTEM UTAMA
     *******************************************************************************/
    function fetchNews() {
        fetch('https://rss2json.com/api.json?rss_url=https://news.google.com/rss?hl=id&gl=ID&ceid=ID:id')
        .then(r => r.json())
        .then(data => {
            const news = data.items.map(i => i.title.toUpperCase()).join(' ••• ');
            document.getElementById('newsContent').textContent = news + ' ••• ';
        })
        .catch(() => {
            document.getElementById('newsContent').textContent = "GAGAL MEMUAT BERITA TERBARU.";
        });
    }

    async function fetchWeatherCAP() {
        const alertContent = document.getElementById('alert-content');
        const mockWeather = "Cerah Berawan, 32°C. Kelembapan 75%."; 
        alertContent.innerHTML = `<strong>${mockWeather}</strong> (Pembaruan: ${new Date().toLocaleTimeString('id-ID')})`;
    }

    function formatTglTampilan(strTanggal) {
        if (!strTanggal) return '-';
        const d = new Date(strTanggal);
        if (isNaN(d.getTime())) return strTanggal;
        const opsi = { day: '2-digit', month: 'short' };
        return d.toLocaleDateString('id-ID', opsi);
    }

    function updateDashboard() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        const infoInternalGabungan = beritaInternal.filter(b => b.trim() !== "").join(' --- ') + ' --- ';
        document.getElementById('internalContent').textContent = infoInternalGabungan.toUpperCase();

        const hariIni = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        hariIni.setHours(0,0,0,0);

        const tbody = document.getElementById('schedule-body');
        tbody.innerHTML = '';

        daftarPelatihan.forEach(item => {
            const tglMulai = new Date(item.tgl_mulai);
            const tglSelesai = new Date(item.tgl_selesai);
            
            tglMulai.setHours(0,0,0,0);
            tglSelesai.setHours(0,0,0,0);

            if (hariIni > tglSelesai) {
                return; 
            }

            let statusText = 'AKAN DATANG';
            let rowClass = '';

            if (hariIni >= tglMulai && hariIni <= tglSelesai) {
                statusText = '<span class="blink">● BERLANGSUNG</span>';
                rowClass = 'status-active'; 
            }

            const row = document.createElement('tr');
            if (rowClass) row.className = rowClass;

            row.innerHTML = `
                <td>${formatTglTampilan(item.tgl_mulai)}</td>
                <td>${formatTglTampilan(item.tgl_selesai)}</td>
                <td>${item.nama}</td>
                <td>${item.jamlat}</td>
                <td>${item.metode}</td>
                <td>${item.pic}</td>
                <td>${statusText}</td>
            `;
            tbody.appendChild(row);
        });
    }

    setInterval(updateDashboard, 1000);
    setInterval(fetchWeatherCAP, 3600000); 
    setInterval(fetchNews, 1800000);       

    updateDashboard();
    fetchWeatherCAP();
    fetchNews();
</script>

</body>
</html>
