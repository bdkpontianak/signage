<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage BDK Pontianak - New Design</title>
    <style>
        :root {
            /* Palette berdasarkan template */
            --color-video-bg: #ffffff;
            --color-sidebar: #f2cc59; /* Kuning Sidebar */
            --color-ticker-1: #215176; /* Biru Steel (Info Pelatihan) */
            --color-ticker-2: #1a237e; /* Biru Navy (Berita Internal) */
            --color-ticker-3: #f2a742; /* Orange (Berita CSS) */
            --color-clock-bg: #1e435d; /* Biru Gelap Jam */
            --text-dark: #000000;
            --text-light: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Container Utama menggunakan Grid */
        .main-layout {
            display: grid;
            grid-template-columns: 78% 22%; /* Area Video vs Sidebar */
            grid-template-rows: auto 55px 55px 55px; /* Video + 3 Ticker */
            height: 100vh;
            width: 100vw;
            border: 5px solid #000;
            box-sizing: border-box;
        }

        /* Area Video Utama */
        .video-section {
            background-color: var(--color-video-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 2px solid #000;
        }

        .video-section iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Sidebar Kanan */
        .sidebar {
            grid-row: 1 / 2;
            background-color: var(--color-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            color: var(--text-dark);
            border-left: 5px solid #000;
            border-bottom: 5px solid #000;
        }

        .sidebar-title {
            font-size: 24px;
            font-weight: bold;
            line-height: 1.3;
        }

        /* Newstickers */
        .ticker-container {
            display: flex;
            align-items: center;
            color: var(--text-light);
            font-weight: bold;
            font-size: 20px;
            overflow: hidden;
            border-bottom: 2px solid #000;
            text-transform: uppercase;
        }

        .ticker-info { background-color: var(--color-ticker-1); }
        .ticker-internal { background-color: var(--color-ticker-2); }
        .ticker-css { background-color: var(--color-ticker-3); color: var(--text-dark); }

        /* Area Jam (Pojok Kanan Bawah) */
        .clock-section {
            grid-column: 2 / 3;
            grid-row: 2 / 5;
            background-color: var(--color-clock-bg);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 5px solid #000;
        }

        #date { font-size: 22px; margin-bottom: 5px; }
        #clock { font-size: 68px; font-weight: bold; }

        /* Marquee Animation */
        .marquee {
            white-space: nowrap;
            display: inline-block;
            padding-left: 100%;
            animation: marquee 30s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .ticker-label {
            padding: 0 20px;
            white-space: nowrap;
            z-index: 2;
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="video-section">
        <iframe src="https://www.youtube.com/embed/videoseries?list=PL6cAFDkCmjW9aUwVGfKRf5Hatxip4zecQ&autoplay=1&mute=1&loop=1&playlist=PL6cAFDkCmjW9aUwVGfKRf5Hatxip4zecQ&controls=0" 
                allow="autoplay; encrypted-media">
        </iframe>
    </div>

    <div class="sidebar">
        <div class="sidebar-title">
            Berita CSS Google<br>dengan keyword<br>"Menteri Keuangan"
        </div>
    </div>

    <div class="ticker-container ticker-info">
        <div class="marquee" id="pelatihanTicker">
            MEMUAT JADWAL PELATIHAN TERBARU BDK PONTIANAK ...
        </div>
    </div>

    <div class="ticker-container ticker-internal">
        <div class="marquee" id="internalTicker">
            MEMUAT BERITA INTERNAL ...
        </div>
    </div>

    <div class="ticker-container ticker-css">
        <div class="marquee" id="cssTicker">
            MEMUAT BERITA KEUANGAN TERKINI ...
        </div>
    </div>

    <div class="clock-section">
        <div id="date">Senin | 8 Juni 2026</div>
        <div id="clock">00:00:00</div>
    </div>
</div>

<script>
    // Data dummy sesuai script asli Anda
    const daftarPelatihan = [
        "PJJ Aspek dan Potensi Pajak Sektor Pertambangan Angkatan I (8-12 Juni)",
        "PJJ Bendahara Pengeluaran Angkatan V (8-15 Juni)",
        "PJJ Penatausahaan BMN Angkatan VII (8-18 Juni)",
        "PJJ Menulis untuk Media Massa Angkatan I (Sampai 19 Juni)"
    ];

    const beritaInternal = [
        "TOLAK DAN LAPORKAN GRATIFIKASI melalui saluran pengaduan resmi: pengaduan.bdkpnk@kemenkeu.go.id",
        "Sinergi Program INKUBBI dan UMKM Beyond Border terus ditingkatkan",
        "BDK PONTIANAK: TERUKUR, BAHAGIA, IKHLAS"
    ];

    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        
        document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        
        // Format: Senin | 8 Juni 2026
        const day = now.toLocaleDateString('id-ID', { weekday: 'long' });
        const date = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('date').innerText = `${day} | ${date}`;
    }

    function initTickers() {
        // Ticker 1: Pelatihan
        document.getElementById('pelatihanTicker').innerText = "INFO PELATIHAN: " + daftarPelatihan.join(" ••• ").toUpperCase();
        
        // Ticker 2: Internal
        document.getElementById('internalTicker').innerText = "BERITA INTERNAL: " + beritaInternal.join(" ••• ").toUpperCase();
        
        // Ticker 3: Berita Google CSS (Fetch dari API rss2json yang Anda gunakan)
        fetch('https://rss2json.com/api.json?rss_url=https://news.google.com/rss/search?q=Menteri+Keuangan&hl=id&gl=ID&ceid=ID:id')
        .then(r => r.json())
        .then(data => {
            const newsArr = data.items.map(i => i.title.toUpperCase());
            document.getElementById('cssTicker').innerText = "BERITA KEUANGAN: " + newsArr.join(" ••• ");
        })
        .catch(() => {
            document.getElementById('cssTicker').innerText = "GAGAL MEMUAT BERITA GOOGLE CSS.";
        });
    }

    setInterval(updateClock, 1000);
    window.onload = () => {
        updateClock();
        initTickers();
    };
</script>

</body>
</html>
