<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage BDK Pontianak - TV Station Style</title>
    <style>
        :root {
            --bg-dark: #020b14;
            --cnbc-blue: #002f6c;
            --cnbc-light-blue: #0a58ca;
            --accent-green: #00e676;
            --accent-yellow: #f2cc59;
            --panel-dark: #0b1a2d;
            --text-white: #ffffff;
            --ticker-black: #000000;
            --red-alert: #b71c1c;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            font-family: 'Arial Condensed', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Grid Layout Utama CNBC Style */
        .dashboard-container {
            display: grid;
            grid-template-columns: 58% 42%; /* Kiri: Video, Kanan: Informasi Pelatihan */
            grid-template-rows: calc(100vh - 145px) 75px 70px; /* Konten, Banner Utama, Double Ticker */
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }

        /* Area Kiri: Player Video YouTube */
        .video-broadcast {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            background: #000;
            position: relative;
            border-right: 4px solid #000;
            border-bottom: 4px solid #000;
        }

        .video-broadcast iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Area Kanan: Papan Informasi Pelatihan Aktif */
        .stock-board {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            background: linear-gradient(135deg, #0f2b48 0%, #051424 100%);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 4px solid #000;
            box-sizing: border-box;
            overflow: hidden;
        }

        .board-header {
            background: linear-gradient(to right, #ffffff, #e0e0e0);
            color: #002f6c;
            font-size: 24px;
            font-weight: 900;
            padding: 10px 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Baris Informasi Pelatihan */
        .stock-row {
            background: rgba(11, 26, 45, 0.8);
            border: 2px solid #1e3d5f;
            border-radius: 6px;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Nama Pelatihan - TIDAK DISINGKAT (Mendukung Multi-line) */
        .stock-name {
            font-size: 15px;
            color: #ffffff;
            font-weight: bold;
            text-transform: uppercase;
            line-height: 1.3;
            word-wrap: break-word;
            white-space: normal;
        }

        /* Baris Detail Pelatihan (Tanggal, JP, PIC) */
        .stock-values {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #8ab4f8;
            font-weight: bold;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 4px;
            margin-top: 2px;
        }

        .status-jp {
            color: var(--accent-green);
        }

        .pic-name {
            color: var(--accent-yellow);
            font-style: italic;
        }

        /* Banner Melintang Tengah */
        .mid-banner {
            grid-column: 1 / 3;
            grid-row: 2 / 3;
            display: grid;
            grid-template-columns: 15% 57% 28%;
            background-color: var(--cnbc-blue);
            border-bottom: 4px solid #000;
            align-items: center;
        }

        .banner-badge {
            background: linear-gradient(135deg, #1b5e20 0%, #00e676 100%);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            font-style: italic;
            text-shadow: 2px 2px #000;
            border-right: 4px solid #000;
        }

        .banner-title {
            padding-left: 20px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Panel Jam Komponen */
        .banner-clock-panel {
            background-color: #1a237e;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-left: 4px solid #000;
        }

        #time-display { font-size: 30px; font-weight: bold; font-family: monospace; color: #ffffff; }
        #date-display { font-size: 11px; color: #b0bec5; font-weight: bold; letter-spacing: 0.5px; }

        /* Ticker Area Paling Bawah */
        .bottom-ticker-area {
            grid-column: 1 / 3;
            grid-row: 3 / 4;
            display: grid;
            grid-template-columns: 75% 25%;
            height: 100%;
            background-color: var(--ticker-black);
        }

        /* Wrapper Marquee Ganda */
        .marquee-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }

        .ticker-line {
            height: 50%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            background-color: #050505;
        }
        
        .line-1-wrapper { border-bottom: 1px solid #222; }

        /* Struktur CSS Marquee yang Valid dan Bergerak */
        .marquee-wrapper {
            display: flex;
            width: 100%;
            overflow: hidden;
        }

        .marquee-content {
            display: flex;
            white-space: nowrap;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            animation: marquee-smooth 45s linear infinite;
        }

        .ticker-item {
            padding-right: 80px;
        }

        .ticker-line-1 { color: #ffffff; }
        .ticker-line-2 { color: #ffb300; } /* Khusus Google News CSS */

        @keyframes marquee-smooth {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }

        /* Red Panel Info Cuaca */
        .side-alert-panel {
            background-color: var(--red-alert);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 20px;
            border-left: 4px solid #000;
            font-weight: bold;
        }

        .alert-row-title { font-size: 11px; color: #ffcdd2; text-transform: uppercase; letter-spacing: 0.5px; }
        .alert-row-value { font-size: 20px; color: #ffffff; }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="video-broadcast">
        <iframe src="https://www.youtube.com/embed/videoseries?list=PL6cAFDkCmjW9aUwVGfKRf5Hatxip4zecQ&autoplay=1&mute=1&loop=1&playlist=PL6cAFDkCmjW9aUwVGfKRf5Hatxip4zecQ&controls=1" 
                frameborder="0"
                allow="autoplay; encrypted-media">
        </iframe>
    </div>

    <div class="stock-board" id="schedule-container">
        <div class="board-header">Jadwal Pelatihan</div>
        </div>

    <div class="mid-banner">
        <div class="banner-badge">INFO UTAMA</div>
        <div class="banner-title">BALAI DIKLAT KEUANGAN PONTIANAK DIGITAL SIGNAGE</div>
        <div class="banner-clock-panel">
            <div id="time-display">00:00:00</div>
            <div id="date-display">MEMUAT TANGGAL...</div>
        </div>
    </div>

    <div class="bottom-ticker-area">
        <div class="marquee-container">
            
            <div class="ticker-line line-1-wrapper">
                <div class="marquee-wrapper">
                    <div class="marquee-content ticker-line-1" id="internalContent"></div>
                </div>
            </div>
            
            <div class="ticker-line">
                <div class="marquee-wrapper">
                    <div class="marquee-content ticker-line-2" id="newsContent"></div>
                </div>
            </div>
            
        </div>

        <div class="side-alert-panel">
            <div class="alert-row-title">☀️ INFO CUACA BDK PONTIANAK</div>
            <div class="alert-row-value" id="weather-display">Memuat...</div>
        </div>
    </div>
</div>

<script>
    /*******************************************************************************
     * 1. DATA MASTER (BERDASARKAN REFEERENSI)
     *******************************************************************************/
    const daftarPelatihan = [
        {
            tgl_mulai:   '2026-06-08',
            tgl_selesai: '2026-06-12',
            nama:        'PJJ Aspek dan Potensi Pajak Sektor Pertambangan Angkatan I',
            jamlat:      '40',
            metode:      'PJJ',
            pic:         'Sri Santoso'
        },
        {
            tgl_mulai:   '2026-06-08',
            tgl_selesai: '2026-06-15',
            nama:        'Pelatihan Jarak Jauh Bendahara Pengeluaran/Bendahara Pengeluaran Pembantu Angkatan V',
            jamlat:      '33',
            metode:      'PJJ',
            pic:         'Damhudi'
        },
        {
            tgl_mulai:   '2026-06-08',
            tgl_selesai: '2026-06-18',
            nama:        'Pelatihan Jarak Jauh Penatausahaan Barang Milik Negara Bagi Pengguna Barang Angkatan VII',
            jamlat:      '49',
            metode:      'PJJ',
            pic:         'Riki'
        },
        {
            tgl_mulai:   '2026-05-11',
            tgl_selesai: '2026-06-19',
            nama:        'Pelatihan Jarak Jauh Menulis untuk Media Massa Angkatan I',
            jamlat:      '43',
            metode:      'PJJ',
            pic:         'Gilang'
        },
        {
            tgl_mulai:   '2026-06-22',
            tgl_selesai: '2026-06-26',
            nama:        'PJJ Proses Bisnis dan Aspek Perpajakan Segmentasi Wajib Pajak High Wealth Individual (HWI) dan Group Angkatan I',
            jamlat:      '40',
            metode:      'PJJ',
            pic:         'Dharmindra'
        }
    ];

    const beritaInternal = [
        "Mulai dari beragam pelatihan, berbagai kegiatan penguatan kapasitas SDM pengelola keuangan, kolaborasi lintas unit yang terus diperluas, hingga evaluasi pembelajaran mahasiswa - satu bulan yang produktif telah dilalui bersama. Semua ini adalah bagian dari komitmen BPPK dalam mencetak SDM unggul untuk pengelolaan keuangan negara yang lebih baik.",
        "Sinergi bukan sekadar kata tetapi adalah langkah nyata Dukungan penuh dari pimpinan Perwakilan Kementerian Keuangan Kalimantan Barat menjadi energi besar bagi penguatan UMKM melalui kolaborasi program INKUBBI dan UMKM Beyond Border",
        "TOLAK DAN LAPORKAN GRATIFIKASI melalui saluran pengaduan resmi berikut: pengaduan.bdkpnk@kemenkeu.go.id | wise.kemenkeu.go.id",
        "BDK PONTIANAK: TERUKUR, BAHAGIA, IKHLAS",
        "JAGA KESEHATAN DAN TETAP SEMANGAT DALAM MELAYANI"
    ];

    /*******************************************************************************
     * 2. ENGINE SISTEM & TICKER RUNNING
     *******************************************************************************/
    // Membuat teks berjalan stabil & berulang otomatis tanpa patah (Duplikasi Node)
    function buildMarqueeDOM(elementId, itemsArray, separator) {
        const target = document.getElementById(elementId);
        if (!target) return;
        
        const textRaw = itemsArray.filter(b => b.trim() !== "").join(separator).toUpperCase() + separator;
        target.innerHTML = `
            <div class="ticker-item">${textRaw}</div>
            <div class="ticker-item">${textRaw}</div>
        `;
    }

    // Mengambil Berita Realtime Google RSS dengan keyword Menteri Keuangan
    function fetchNews() {
        fetch('https://rss2json.com/api.json?rss_url=https://news.google.com/rss/search?q=Menteri+Keuangan&hl=id&gl=ID&ceid=ID:id')
        .then(r => r.json())
        .then(data => {
            const newsArr = data.items.map(i => i.title.toUpperCase());
            buildMarqueeDOM('newsContent', newsArr, '  •••  ');
        })
        .catch(() => {
            document.getElementById('newsContent').innerHTML = `<div class="ticker-item">GAGAL MEMUAT BERITA TERBARU DARI GOOGLE CSS.</div>`;
        });
    }

    // Sinkronisasi data Info Cuaca Pontianak
    function fetchWeather() {
        const display = document.getElementById('weather-display');
        display.innerHTML = "Cerah Berawan, 32°C";
    }

    // Formatter tanggal untuk papan informasi
    function formatTglTampilan(strTanggal) {
        if (!strTanggal) return '-';
        const d = new Date(strTanggal);
        if (isNaN(d.getTime())) return strTanggal;
        const opsi = { day: '2-digit', month: 'short' };
        return d.toLocaleDateString('id-ID', opsi);
    }

    // PERBAIKAN 1: Update Jam & Hari Otomatis setiap detik
    function updateClockOnly() {
        const now = new Date();
        document.getElementById('time-display').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        
        const dayStr = now.toLocaleDateString('id-ID', { weekday: 'long' }).toUpperCase();
        const dateStr = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
        document.getElementById('date-display').innerText = `${dayStr} | ${dateStr}`;
    }

    // PERBAIKAN 3 & 4: Render Papan Pelatihan Tanpa Singkatan + Informasi PIC
    function refreshScheduleBoard() {
        const now = new Date();
        const hariIni = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        hariIni.setHours(0,0,0,0);

        const container = document.getElementById('schedule-container');
        
        // Hapus data lama kecuali header judul utama
        const headerHtml = `<div class="board-header">Jadwal Pelatihan</div>`;
        container.innerHTML = headerHtml;

        // Filter pelatihan aktif/akan datang
        const pelatihanAktif = daftarPelatihan.filter(item => {
            const tglSelesai = new Date(item.tgl_selesai);
            tglSelesai.setHours(0,0,0,0);
            return hariIni <= tglSelesai;
        });

        // Tampilkan maksimal 4 teratas agar tidak memotong layar kebawah
        const limits = pelatihanAktif.slice(0, 4);

        limits.forEach(item => {
            const row = document.createElement('div');
            row.className = 'stock-row';
            
            // Render elemen dengan nama pelatihan utuh dan penambahan PIC disamping indikator JP
            row.innerHTML = `
                <div class="stock-name">${item.nama}</div>
                <div class="stock-values">
                    <div>📅 ${formatTglTampilan(item.tgl_mulai)} - ${formatTglTampilan(item.tgl_selesai)} (${item.metode})</div>
                    <div class="pic-name">👤 PIC: ${item.pic}</div>
                    <div class="status-jp">▲ ${item.jamlat} JP</div>
                </div>
            `;
            container.appendChild(row);
        });
    }

    /*******************************************************************************
     * 3. INITIALIZATION & INTERVAL MANAGEMENT
     *******************************************************************************/
    // Sistem Manajemen Loop Realtime
    setInterval(updateClockOnly, 1000);         
    setInterval(refreshScheduleBoard, 60000);   
    setInterval(fetchWeather, 3600000); 
    setInterval(fetchNews, 1800000);       

    window.addEventListener('DOMContentLoaded', () => {
        updateClockOnly();
        refreshScheduleBoard();
        fetchWeather();
        fetchNews();
        
        // PERBAIKAN 2: Aktifkan Ticker Berita Internal
        buildMarqueeDOM('internalContent', beritaInternal, '  ---  ');
    });
</script>

</body>
</html>
