<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDK Pontianak Digital Signage</title>
    <style>
        :root {
            --bg-color: #050505;
            --header-color: #003366;
            --accent-color: #f1c40f; 
            --internal-bg: #b30000; /* Merah */
            --news-bg: #d35400;     /* Orange Tua */
            --text-normal: #ffffff;
            --text-dim: #b0b0b0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-normal);
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background-color: var(--header-color);
            border-bottom: 4px solid #444;
        }

        .logo-text h1 { margin: 0; font-size: 20px; }
        .logo-text p { margin: 0; color: var(--accent-color); font-weight: bold; font-size: 11px; }

        #weather-alert {
            background: #1a1a1a;
            border-left: 5px solid var(--accent-color);
            margin: 10px 15px 0 15px;
            padding: 12px;
            display: block;
        }

        .container {
            display: grid;
            /* Kolom kiri fleksibel, kolom kanan otomatis mengikuti lebar proporsional video */
            grid-template-columns: 1fr auto;
            height: calc(100vh - 240px);
            padding: 15px;
            gap: 15px;
        }

        .schedule-board {
            background: #111;
            border-radius: 5px;
            padding: 10px;
            border: 1px solid #333;
            overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
        th { text-align: left; padding: 10px; background: #222; color: var(--accent-color); position: sticky; top: 0; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #222; }

        /* Efek Berkedip Seluruh Baris ala Bandara (Landing/Delaying effect) */
        .status-active { 
            font-weight: bold; 
            background: rgba(241, 196, 15, 0.08); 
            animation: airport-blink 2s infinite ease-in-out;
        }
        
        .blink { animation: text-blink 1s linear infinite; }

        @keyframes airport-blink {
            0%, 100% { color: var(--text-normal); background: rgba(241, 196, 15, 0.05); }
            50% { color: var(--accent-color); background: rgba(241, 196, 15, 0.15); }
        }

        @keyframes text-blink { 50% { opacity: 0.3; } }

        /* Sempurna 16:9 mengikuti tinggi maksimal kontainer tanpa ruang mubazir */
        .media-area { 
            background: #000; 
            border: 2px solid #333; 
            border-radius: 5px; 
            height: 100%;
            aspect-ratio: 16 / 9;
            box-sizing: border-box;
            overflow: hidden;
        }

        .media-area iframe {
            width: 100%;
            height: 100%;
            display: block;
        }

        footer {
            position: fixed;
            bottom: 0; width: 100%;
            display: flex;
            flex-direction: column;
        }

        .ticker-row { height: 35px; display: flex; align-items: center; overflow: hidden; position: relative; }
        .orange-ticker { background: var(--news-bg); border-top: 1px solid rgba(255,255,255,0.2); }
        .red-ticker { background: var(--internal-bg); border-top: 1px solid rgba(255,255,255,0.2); }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee-animation 60s linear infinite;
            font-size: 15px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        @keyframes marquee-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">
        <h1>BALAI DIKLAT KEUANGAN PONTIANAK</h1>
        <p>TERUKUR - BAHAGIA - IKHLAS</p>
    </div>
    <div style="text-align: right;">
        <div id="clock" style="font-size: 24px; color: var(--accent-color); font-family: monospace;">00:00:00</div>
        <div id="date" style="font-size: 12px;"></div>
    </div>
</header>

<div id="weather-alert">
    <strong style="color: var(--accent-color);">☀️ INFO CUACA BDK PONTIANAK:</strong>
    <span id="alert-content">Memuat data cuaca...</span>
</div>

<div class="container">
    <div class="schedule-board">
        <table>
            <thead>
                <tr>
                    <th width="12%">MULAI</th>
                    <th width="12%">SELESAI</th>
                    <th width="31%">NAMA PELATIHAN</th>
                    <th width="8%">JAMLAT</th>
                    <th width="10%">METODE</th>
                    <th width="15%">PIC</th>
                    <th width="12%">STATUS</th>
                </tr>
            </thead>
            <tbody id="schedule-body"></tbody>
        </table>
    </div>

    <div class="media-area">
        <!-- Modifikasi URL YouTube: mute=1 dihapus, ditambahkan &fs=0 untuk menyembunyikan tombol fullscreen bawaan, dan allowfullscreen dibuang -->
        <iframe src="https://www.youtube.com/embed/videoseries?list=PL6cAFDkCmjW9aUwVGfKRf5Hatxip4zecQ&autoplay=1&loop=1&playlist=PL6cAFDkCmjW9aUwVGfKRf5Hatxip4zecQ&fs=0" frameborder="0"></iframe>
    </div>
</div>

<footer>
    <div class="ticker-row orange-ticker">
        <div class="marquee-content" id="newsContent">MENGHUBUNGKAN KE GOOGLE NEWS RSS...</div>
    </div>
    <div class="ticker-row red-ticker">
        <div class="marquee-content" id="internalContent">MEMUAT PENGUMUMAN INTERNAL...</div>
    </div>
</footer>

<script>
    /*******************************************************************************
     * 1. PENGATURAN DATA PELATIHAN (SILAHKAN EDIT DI SINI)
     *******************************************************************************/
    const daftarPelatihan = [
        {
            tgl_mulai:   '2026-05-04',
            tgl_selesai: '2026-05-07',
            nama:        'Pelatihan Jarak Jauh Sistem Manajemen Keamanan Informasi Angkatan II',
            jamlat:      '33',
            metode:      'PJJ',
            pic:         'Damhudi'
        },
        {
            tgl_mulai:   '2026-05-04',
            tgl_selesai: '2026-05-11',
            nama:        'Pelatihan Jarak Jauh Bendahara Pengeluaran/Bendahara Pengeluaran Pembantu Angkatan IV',
            jamlat:      '33',
            metode:      'PJJ',
            pic:         'Dharmindra'
        },
        {
            tgl_mulai:   '2026-05-06',
            tgl_selesai: '2026-05-08',
            nama:        'E-Learning Pembekalan dan Sertifikasi Penyusun RKA Level Manajerial Angkatan II',
            jamlat:      '9',
            metode:      'PJJ',
            pic:         'Riki'
        },
        {
            tgl_mulai:   '2026-05-11',
            tgl_selesai: '2026-06-19',
            nama:        'Pelatihan Jarak Jauh Menulis untuk Media Massa Angkatan I',
            jamlat:      '43',
            metode:      'PJJ',
            pic:         'Gilang'
        },
        {
            tgl_mulai:   '2026-05-18',
            tgl_selesai: '2026-05-22',
            nama:        'PJJ Pembuatan Analisis untuk Penentuan Objek Penggalian Potensi Angkatan I',
            jamlat:      '40',
            metode:      'PJJ',
            pic:         '-'
        },
        {
            tgl_mulai:   '2026-05-18',
            tgl_selesai: '2026-05-22',
            nama:        'Pelatihan Penggalian Potensi Pajak Daerah Angkatan I',
            jamlat:      '40',
            metode:      'PJJ',
            pic:         '-'
        },
        {
            tgl_mulai:   '2026-05-18',
            tgl_selesai: '2026-06-04',
            nama:        'Pelatihan Jarak Jauh Teknik Penyusunan Laporan yang Efektif Angkatan I',
            jamlat:      '24',
            metode:      'PJJ',
            pic:         'Damhudi'
        },
        {
            tgl_mulai:   '2026-05-19',
            tgl_selesai: '2026-05-25',
            nama:        'Pelatihan Jarak Jauh Pejabat Pembuat Komitmen Angkatan III',
            jamlat:      '24',
            metode:      'PJJ',
            pic:         'Sri'
        },
    ];


    /*******************************************************************************
     * 2. PENGATURAN NEWSTICKER "INFO INTERNAL"
     *******************************************************************************/
    const beritaInternal = [
        "Mulai dari beragam pelatihan, berbagai kegiatan penguatan kapasitas SDM pengelola keuangan, kolaborasi lintas unit yang terus diperluas, hingga evaluasi pembelajaran mahasiswa - satu bulan yang produktif telah dilalui bersama. Semua ini adalah bagian dari komitmen BPPK dalam mencetak SDM unggul untuk pengelolaan keuangan negara yang lebih baik.",
        "Sinergi bukan sekadar kata tetapi adalah langkah nyata Dukungan penuh dari pimpinan Perwakilan Kementerian Keuangan Kalimantan Barat menjadi energi besar bagi penguatan UMKM melalui kolaborasi program INKUBBI dan UMKM Beyond Border",
        "TOLAK DAN LAPORKAN GRATIFIKASI melalui saluran pengaduan resmi berikut: pengaduan.bdkpnk@kemenkeu.go.id | wise.kemenkeu.go.id",
        "BDK PONTIANAK: TERUKUR, BAHAGIA, IKHLAS",
        "JAGA KESEHATAN DAN TETAP SEMANGAT DALAM MELAYANI"
    ];


    /*******************************************************************************
     * KODE SISTEM UTAMA (JANGAN DIUBAH KECUALI OLEH PROGRAMMER)
     *******************************************************************************/
    
    function fetchNews() {
        fetch('https://rss2json.com/api.json?rss_url=https://news.google.com/rss?hl=id&gl=ID&ceid=ID:id')
        .then(r => r.json())
        .then(data => {
            const news = data.items.map(i => i.title.toUpperCase()).join(' ••• ');
            document.getElementById('newsContent').textContent = news + ' ••• ';
        })
        .catch(() => {
            document.getElementById('newsContent').textContent = "GAGAL MEMUAT BERITA TERBARU.";
        });
    }

    async function fetchWeatherCAP() {
        const alertContent = document.getElementById('alert-content');
        const mockWeather = "Cerah Berawan, 32°C. Kelembapan 75%."; 
        alertContent.innerHTML = `<strong>${mockWeather}</strong> (Pembaruan: ${new Date().toLocaleTimeString()})`;
    }

    function formatTglTampilan(strTanggal) {
        if (!strTanggal) return '-';
        const d = new Date(strTanggal);
        if (isNaN(d.getTime())) return strTanggal;
        const opsi = { day: '2-digit', month: 'short' };
        return d.toLocaleDateString('id-ID', opsi);
    }

    function updateDashboard() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        const infoInternalGabungan = beritaInternal.filter(b => b.trim() !== "").join(' --- ') + ' --- ';
        document.getElementById('internalContent').textContent = infoInternalGabungan.toUpperCase();

        const hariIni = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        hariIni.setHours(0,0,0,0);

        const tbody = document.getElementById('schedule-body');
        tbody.innerHTML = '';

        daftarPelatihan.forEach(item => {
            const tglMulai = new Date(item.tgl_mulai);
            const tglSelesai = new Date(item.tgl_selesai);
            
            tglMulai.setHours(0,0,0,0);
            tglSelesai.setHours(0,0,0,0);

            // Lewati/Sembunyikan pelatihan jika sudah selesai
            if (hariIni > tglSelesai) {
                return; 
            }

            let statusText = 'AKAN DATANG';
            let rowClass = '';

            if (hariIni >= tglMulai && hariIni <= tglSelesai) {
                statusText = '<span class="blink">● BERLANGSUNG</span>';
                rowClass = 'status-active'; // Mengaktifkan efek kedip satu baris penuh
            }

            const row = document.createElement('tr');
            if (rowClass) row.className = rowClass;

            row.innerHTML = `
                <td>${formatTglTampilan(item.tgl_mulai)}</td>
                <td>${formatTglTampilan(item.tgl_selesai)}</td>
                <td>${item.nama}</td>
                <td>${item.jamlat}</td>
                <td>${item.metode}</td>
                <td>${item.pic}</td>
                <td>${statusText}</td>
            `;
            tbody.appendChild(row);
        });
    }

    // Timer & Interval
    setInterval(updateDashboard, 1000);
    setInterval(fetchWeatherCAP, 3600000); 
    setInterval(fetchNews, 1800000);       

    // Load Pertama Kali
    updateDashboard();
    fetchWeatherCAP();
    fetchNews();
</script>

</body>
</html>
