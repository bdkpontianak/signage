<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi Diklat & Cuaca BDK Pontianak</title>
    <style>
        :root {
            --bg-color: #050505;
            --header-color: #003366;
            --accent-color: #f1c40f; 
            --internal-bg: #b30000; /* Merah */
            --news-bg: #d35400;     /* Orange Tua */
            --text-normal: #ffffff;
            --text-dim: #b0b0b0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-normal);
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background-color: var(--header-color);
            border-bottom: 4px solid #444;
        }

        .logo-text h1 { margin: 0; font-size: 20px; }
        .logo-text p { margin: 0; color: var(--accent-color); font-weight: bold; font-size: 11px; }

        #weather-alert {
            background: #1a1a1a;
            border-left: 5px solid var(--accent-color);
            margin: 10px 15px 0 15px;
            padding: 12px;
            display: block;
        }

        .container {
            display: grid;
            grid-template-columns: 72% 28%;
            height: calc(100vh - 240px);
            padding: 15px;
            gap: 15px;
        }

        .schedule-board {
            background: #111;
            border-radius: 5px;
            padding: 10px;
            border: 1px solid #333;
            overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
        th { text-align: left; padding: 10px; background: #222; color: var(--accent-color); position: sticky; top: 0; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #222; }

        .status-active { color: var(--accent-color); font-weight: bold; background: rgba(241, 196, 15, 0.1); }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }

        .media-area { background: #000; border: 2px solid #333; border-radius: 5px; position: relative; }

        footer {
            position: fixed;
            bottom: 0; width: 100%;
            display: flex;
            flex-direction: column;
        }

        .ticker-row { height: 35px; display: flex; align-items: center; overflow: hidden; position: relative; }
        .orange-ticker { background: var(--news-bg); border-top: 1px solid rgba(255,255,255,0.2); }
        .red-ticker { background: var(--internal-bg); border-top: 1px solid rgba(255,255,255,0.2); }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee-animation 60s linear infinite;
            font-size: 15px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        @keyframes marquee-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">
        <h1>BALAI DIKLAT KEUANGAN PONTIANAK</h1>
        <p>KALENDER PEMBELAJARAN TA 2026 - REVISI</p>
    </div>
    <div style="text-align: right;">
        <div id="clock" style="font-size: 24px; color: var(--accent-color); font-family: monospace;">00:00:00</div>
        <div id="date" style="font-size: 12px;"></div>
    </div>
</header>

<div id="weather-alert">
    <strong style="color: var(--accent-color);">☀️ INFO CUACA BDK PONTIANAK:</strong>
    <span id="alert-content">Memuat data cuaca...</span>
</div>

<div class="container">
    <div class="schedule-board">
        <table>
            <thead>
                <tr>
                    <th width="10%">MULAI</th>
                    <th width="10%">SELESAI</th>
                    <th width="35%">NAMA PELATIHAN</th>
                    <th width="8%">JAMLAT</th>
                    <th width="10%">METODE</th>
                    <th width="15%">PIC</th>
                    <th width="12%">STATUS</th>
                </tr>
            </thead>
            <tbody id="schedule-body"></tbody>
        </table>
    </div>

    <div class="media-area">
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=PL6cAFDkCmjW95RlQ_lwtSM-TrgfBf3SJY&autoplay=1&mute=1&loop=1" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<footer>
    <div class="ticker-row orange-ticker">
        <div class="marquee-content" id="newsContent">MENGHUBUNGKAN KE GOOGLE NEWS RSS...</div>
    </div>
    <div class="ticker-row red-ticker">
        <div class="marquee-content" id="internalContent">MEMUAT PENGUMUMAN INTERNAL...</div>
    </div>
</footer>

<script>
    /**
     * FORMAT BARU RAW DATA:
     * "Tgl_Status(YYYY-MM-DD) | Nama Pelatihan | Tgl_Mulai | Tgl_Selesai | Jamlat | Metode | PIC"
     */
    const rawData = [
        "2026-03-06 | Pelatihan Teknis Perpajakan (Revisi) | 06 Mar | 10 Mar | 45 | Klasikal | Seksi Penyelenggaraan",
        "2026-08-11 | AP / APTS (Kalpem Utama) | 11 Agt | 25 Agt | 111 | PJJ | Bidang PPA",
        "2026-09-01 | Diklat Pengelolaan BMN | 01 Sep | 05 Sep | 40 | Klasikal | Subbag Umum",
        "2026-10-15 | PJJ Akuntansi Pemerintahan | 15 Okt | 20 Okt | 35 | PJJ | Seksi Evaluasi"
    ];

    // RSS Google News - Berita Terkini
    function fetchNews() {
        fetch('https://rss2json.com/api.json?rss_url=https://news.google.com/rss?hl=id&gl=ID&ceid=ID:id')
        .then(r => r.json())
        .then(data => {
            const news = data.items.map(i => i.title.toUpperCase()).join(' ••• ');
            document.getElementById('newsContent').textContent = news + ' ••• ';
        })
        .catch(() => {
            document.getElementById('newsContent').textContent = "GAGAL MEMUAT BERITA TERBARU.";
        });
    }

    // Refresh Cuaca Setiap 60 Menit
    async function fetchWeatherCAP() {
        const alertContent = document.getElementById('alert-content');
        const mockWeather = "Cerah Berawan, 32°C. Kelembapan 75%."; 
        alertContent.innerHTML = `<strong>${mockWeather}</strong> (Pembaruan: ${new Date().toLocaleTimeString()})`;
    }

    function updateDashboard() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        // NewsTicker Internal
        const infoInternal = `INFO KALPEM 2026 REVISI: TOTAL DURASI 387 HARI DENGAN TARGET 1820 PESERTA --- PENANGGUNG JAWAB: ANIK JURSANTUTI --- SELURUH PEGAWAI WAJIB PRESENSI DI APLIKASI SEMESTA --- BDK PONTIANAK: TERUKUR, BAHAGIA, IKHLAS --- `;
        document.getElementById('internalContent').textContent = infoInternal;

        const tbody = document.getElementById('schedule-body');
        tbody.innerHTML = '';

        rawData.forEach(line => {
            const [checkDate, nama, mulai, selesai, jamlat, metode, pic] = line.split('|').map(s => s.trim());
            const isOngoing = now.toISOString().split('T')[0] === checkDate;
            const row = document.createElement('tr');
            if (isOngoing) row.className = 'status-active';

            row.innerHTML = `
                <td>${mulai}</td>
                <td>${selesai}</td>
                <td>${nama}</td>
                <td>${jamlat}</td>
                <td>${metode}</td>
                <td>${pic}</td>
                <td>${isOngoing ? '<span class="blink">● BERLANGSUNG</span>' : 'AKAN DATANG'}</td>
            `;
            tbody.appendChild(row);
        });
    }

    // Timer & Interval
    setInterval(updateDashboard, 1000);
    setInterval(fetchWeatherCAP, 3600000); // 60 Menit
    setInterval(fetchNews, 1800000);       // 30 Menit

    // Load Pertama Kali
    updateDashboard();
    fetchWeatherCAP();
    fetchNews();
</script>

</body>
</html>
